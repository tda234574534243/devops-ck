name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  BACKEND_PATH: devops-project-backend
  FRONTEND_PATH: devops-project-frontend

jobs:
  backend:
    name: Build & Test Backend
    runs-on: ubuntu-latest
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '10.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', '**/global.json') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Restore
        working-directory: ${{ env.BACKEND_PATH }}
        run: dotnet restore

      - name: Build
        working-directory: ${{ env.BACKEND_PATH }}
        run: dotnet build --configuration Release --no-restore

      - name: Run unit tests
        working-directory: ${{ env.BACKEND_PATH }}
        run: dotnet test --configuration Release --no-build --verbosity normal

      - name: Install SonarScanner (for SonarQube)
        if: ${{ env.SONAR_TOKEN != '' && env.SONAR_HOST_URL != '' }}
        run: |
          dotnet tool install --global dotnet-sonarscanner --version 5.* || true
          echo "Adding dotnet tools to PATH"
          echo "##[add-path]$HOME/.dotnet/tools"

      - name: SonarQube begin
        if: ${{ env.SONAR_TOKEN != '' && env.SONAR_HOST_URL != '' }}
        working-directory: ${{ env.BACKEND_PATH }}
        run: |
          export PATH="$HOME/.dotnet/tools:$PATH"
          dotnet sonarscanner begin /k:"${{ github.repository }}" /d:sonar.host.url="$SONAR_HOST_URL" /d:sonar.login="$SONAR_TOKEN"

      - name: SonarQube end
        if: ${{ env.SONAR_TOKEN != '' && env.SONAR_HOST_URL != '' }}
        working-directory: ${{ env.BACKEND_PATH }}
        run: |
          dotnet build --configuration Release
          export PATH="$HOME/.dotnet/tools:$PATH"
          dotnet sonarscanner end /d:sonar.login="$SONAR_TOKEN"

  frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Cache npm registry
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: npm-${{ runner.os }}-${{ hashFiles(format('{0}/package-lock.json', env.FRONTEND_PATH)) }}
          restore-keys: |
            npm-${{ runner.os }}-

      - name: Install dependencies (retry fallback for optional native deps)
        working-directory: ${{ env.FRONTEND_PATH }}
        run: |
          set -e
          npm ci || (
            echo "npm ci failed — removing node_modules and package-lock.json and retrying with npm i"
            rm -rf node_modules package-lock.json
            npm i
          )
          npm rebuild || true

      - name: Build
        working-directory: ${{ env.FRONTEND_PATH }}
        run: npm run build --if-present

  docker:
    name: Build & (optionally) Push Docker Images
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    env:
      DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
      DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
      DOCKER_REGISTRY: ${{ secrets.DOCKER_REGISTRY }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to registry
        if: ${{ env.DOCKER_USERNAME != '' && env.DOCKER_PASSWORD != '' }}
        uses: docker/login-action@v2
        with:
          username: ${{ env.DOCKER_USERNAME }}
          password: ${{ env.DOCKER_PASSWORD }}
          registry: ${{ env.DOCKER_REGISTRY || 'docker.io' }}

      - name: Build and push backend image
        if: ${{ env.DOCKER_USERNAME != '' && env.DOCKER_PASSWORD != '' }}
        uses: docker/build-push-action@v4
        with:
          context: ${{ env.BACKEND_PATH }}
          file: ${{ env.BACKEND_PATH }}/Dockerfile
          push: true
          tags: |
            ${{ env.DOCKER_REGISTRY || 'docker.io' }}/${{ github.repository }}:backend-${{ github.sha }}
            ${{ env.DOCKER_REGISTRY || 'docker.io' }}/${{ github.repository }}:backend-latest

      - name: Build and push frontend image
        if: ${{ env.DOCKER_USERNAME != '' && env.DOCKER_PASSWORD != '' }}
        uses: docker/build-push-action@v4
        with:
          context: ${{ env.FRONTEND_PATH }}
          file: ${{ env.FRONTEND_PATH }}/Dockerfile
          push: true
          tags: |
            ${{ env.DOCKER_REGISTRY || 'docker.io' }}/${{ github.repository }}:frontend-${{ github.sha }}
            ${{ env.DOCKER_REGISTRY || 'docker.io' }}/${{ github.repository }}:frontend-latest

      - name: Prepare images-info
        if: ${{ always() }}
        run: |
          mkdir -p .github
          echo "images-info placeholder" > .github/images-info || true

      - name: Upload built images info
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: images-info
          path: .github/images-info
