name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  BACKEND_PATH: devops-project-backend
  FRONTEND_PATH: devops-project-frontend

jobs:
  backend:
    name: Build & Test Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '10.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', '**/global.json') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Restore
        working-directory: ${{ env.BACKEND_PATH }}
        run: dotnet restore

      - name: Build
        working-directory: ${{ env.BACKEND_PATH }}
        run: dotnet build --configuration Release --no-restore

      - name: Run unit tests
        working-directory: ${{ env.BACKEND_PATH }}
        run: dotnet test --configuration Release --no-build --verbosity normal

      - name: Install SonarScanner (for SonarQube)
        if: ${{ secrets.SONAR_TOKEN && secrets.SONAR_HOST_URL }}
        run: |
          dotnet tool install --global dotnet-sonarscanner --version 5.* || true
          echo "Adding dotnet tools to PATH"
          echo "##[add-path]$HOME/.dotnet/tools"

      - name: SonarQube begin
        if: ${{ secrets.SONAR_TOKEN && secrets.SONAR_HOST_URL }}
        working-directory: ${{ env.BACKEND_PATH }}
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        run: |
          export PATH="$HOME/.dotnet/tools:$PATH"
          dotnet sonarscanner begin /k:"${{ github.repository }}" /d:sonar.host.url="${{ secrets.SONAR_HOST_URL }}" /d:sonar.login="${{ secrets.SONAR_TOKEN }}"

      - name: SonarQube end
        if: ${{ secrets.SONAR_TOKEN && secrets.SONAR_HOST_URL }}
        working-directory: ${{ env.BACKEND_PATH }}
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          dotnet build --configuration Release
          export PATH="$HOME/.dotnet/tools:$PATH"
          dotnet sonarscanner end /d:sonar.login="${{ secrets.SONAR_TOKEN }}"

  frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Cache node modules
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.FRONTEND_PATH }}/node_modules
            ~/.npm
          key: npm-${{ runner.os }}-${{ hashFiles(env.FRONTEND_PATH + '/package-lock.json') }}
          restore-keys: |
            npm-${{ runner.os }}-

      - name: Install dependencies
        working-directory: ${{ env.FRONTEND_PATH }}
        run: npm ci

      - name: Build
        working-directory: ${{ env.FRONTEND_PATH }}
        run: npm run build --if-present

  docker:
    name: Build & (optionally) Push Docker Images
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to registry
        if: ${{ secrets.DOCKER_USERNAME && secrets.DOCKER_PASSWORD }}
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
          registry: ${{ secrets.DOCKER_REGISTRY || 'docker.io' }}

      - name: Build and push backend image
        uses: docker/build-push-action@v4
        with:
          context: ${{ env.BACKEND_PATH }}
          file: ${{ env.BACKEND_PATH }}/Dockerfile
          push: ${{ secrets.DOCKER_USERNAME && secrets.DOCKER_PASSWORD }}
          tags: |
            ${{ secrets.DOCKER_REGISTRY || 'docker.io' }}/${{ github.repository }}:backend-${{ github.sha }}
            ${{ secrets.DOCKER_REGISTRY || 'docker.io' }}/${{ github.repository }}:backend-latest

      - name: Build and push frontend image
        uses: docker/build-push-action@v4
        with:
          context: ${{ env.FRONTEND_PATH }}
          file: ${{ env.FRONTEND_PATH }}/Dockerfile
          push: ${{ secrets.DOCKER_USERNAME && secrets.DOCKER_PASSWORD }}
          tags: |
            ${{ secrets.DOCKER_REGISTRY || 'docker.io' }}/${{ github.repository }}:frontend-${{ github.sha }}
            ${{ secrets.DOCKER_REGISTRY || 'docker.io' }}/${{ github.repository }}:frontend-latest

      - name: Upload built images info
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: images-info
          path: |
            ${{ github.workspace }}/.github/images-info || true
