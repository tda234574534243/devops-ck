name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  BACKEND_PATH: devops-project-backend
  FRONTEND_PATH: devops-project-frontend

jobs:

  backend:
    name: Build & Test Backend
    runs-on: ubuntu-latest

    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', '**/global.json') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Restore dependencies
        working-directory: ${{ env.BACKEND_PATH }}
        run: dotnet restore

      # SONAR FLOW
      - name: Install SonarScanner
        if: ${{ env.SONAR_TOKEN != '' && env.SONAR_HOST_URL != '' }}
        run: |
          dotnet tool install --global dotnet-sonarscanner --version 6.*
          echo "$HOME/.dotnet/tools" >> $GITHUB_PATH

      - name: SonarQube Begin
        if: ${{ env.SONAR_TOKEN != '' && env.SONAR_HOST_URL != '' }}
        working-directory: ${{ env.BACKEND_PATH }}
        run: |
          dotnet sonarscanner begin \
            /k:"${{ github.event.repository.name }}" \
            /o:"${{ github.repository_owner }}" \
            /d:sonar.host.url="${{ env.SONAR_HOST_URL }}" \
            /d:sonar.token="${{ env.SONAR_TOKEN }}"

      - name: Build backend
        working-directory: ${{ env.BACKEND_PATH }}
        run: dotnet build --configuration Release --no-restore

      - name: Run backend tests
        working-directory: ${{ env.BACKEND_PATH }}
        run: dotnet test --configuration Release --no-build --verbosity normal

      - name: Publish backend
        working-directory: ${{ env.BACKEND_PATH }}
        run: dotnet publish --configuration Release -o publish

      - name: SonarQube End
        if: ${{ env.SONAR_TOKEN != '' && env.SONAR_HOST_URL != '' }}
        working-directory: ${{ env.BACKEND_PATH }}
        run: |
          dotnet sonarscanner end \
            /d:sonar.token="${{ env.SONAR_TOKEN }}"

      - name: Upload backend artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-publish
          path: ${{ env.BACKEND_PATH }}/publish

  frontend:
    name: Build Frontend
    runs-on: ubuntu-latest

    # FIX native binding issues
    container:
      image: node:20-bullseye

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Verify Node version
        run: node -v && npm -v

      # IMPORTANT:
      # regenerate clean lockfile locally first if needed
      - name: Install frontend dependencies
        working-directory: ${{ env.FRONTEND_PATH }}
        run: npm ci

      - name: Build frontend
        working-directory: ${{ env.FRONTEND_PATH }}
        run: npm run build

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: ${{ env.FRONTEND_PATH }}/dist

  docker:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest

    needs:
      - backend
      - frontend

    env:
      DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
      DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        if: ${{ env.DOCKER_USERNAME != '' && env.DOCKER_PASSWORD != '' }}
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKER_USERNAME }}
          password: ${{ env.DOCKER_PASSWORD }}

      - name: Build backend image
        if: ${{ env.DOCKER_USERNAME != '' && env.DOCKER_PASSWORD != '' }}
        uses: docker/build-push-action@v5
        with:
            context: ${{ env.BACKEND_PATH }}
            file: ${{ env.BACKEND_PATH }}/Dockerfile
            push: true
            tags: |
              ${{ env.DOCKER_USERNAME }}/devops-backend:latest
              ${{ env.DOCKER_USERNAME }}/devops-backend:${{ github.sha }}


      - name: Build frontend image
        if: ${{ env.DOCKER_USERNAME != '' && env.DOCKER_PASSWORD != '' }}
        uses: docker/build-push-action@v5
        with:
            context: ${{ env.FRONTEND_PATH }}
            file: ${{ env.FRONTEND_PATH }}/Dockerfile
            push: true
            tags: |
              ${{ env.DOCKER_USERNAME }}/devops-frontend:latest
              ${{ env.DOCKER_USERNAME }}/devops-frontend:${{ github.sha }}


      - name: Prepare build info
        run: |
          mkdir -p artifacts
          echo "Build completed successfully" > artifacts/images-info.txt

      - name: Upload build info
        uses: actions/upload-artifact@v4
        with:
          name: docker-images-info
          path: artifacts/images-info.txt
  deploy:
    name: Deploy to Railway
    runs-on: ubuntu-latest

    needs:
      - docker

    env:
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Verify Railway CLI
        run: railway --version

      - name: Deploy Backend
        working-directory: ${{ env.BACKEND_PATH }}
        run: railway up --service backend

      - name: Deploy Frontend
        working-directory: ${{ env.FRONTEND_PATH }}
        run: railway up --service frontend
