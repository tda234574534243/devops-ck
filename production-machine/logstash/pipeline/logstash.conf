input {
  beats {
    port => 5044
  }
  tcp {
    port => 5000
    codec => json_lines
  }
}

filter {
  if [container][labels][com_docker_compose_service] in ["elasticsearch", "kibana", "logstash", "filebeat"] {
    drop { }
  }

  if [message] =~ /^\s*\{/ {
    json {
      source => "message"
      target => "json"
      remove_field => ["message"]
      add_tag => ["parsed_json"]
    }
  }

  if [message] =~ /HTTP request completed/ {
    grok {
      match => {
        "message" => "HTTP request completed\. Method=%{WORD:[http][request][method]} Path=%{DATA:[url][path]} StatusCode=%{INT:[http][response][status_code]} ElapsedMilliseconds=%{NUMBER:[event][duration_ms]} TraceId=%{DATA:[trace][id]} UserId=%{DATA:[user][id]} RemoteIp=%{DATA:[source][ip]}$"
      }
      add_tag => ["http_request_log"]
    }

    mutate {
      convert => {
        "[http][response][status_code]" => "integer"
        "[event][duration_ms]" => "float"
      }
    }
  } else if [message] =~ /HTTP request failed/ {
    grok {
      match => {
        "message" => "HTTP request failed\. Method=%{WORD:[http][request][method]} Path=%{DATA:[url][path]} ElapsedMilliseconds=%{NUMBER:[event][duration_ms]} TraceId=%{DATA:[trace][id]} UserId=%{DATA:[user][id]} RemoteIp=%{DATA:[source][ip]}$"
      }
      add_tag => ["http_request_log", "http_request_failed"]
    }

    mutate {
      convert => {
        "[event][duration_ms]" => "float"
      }
    }
  } else if [message] =~ /^\S+ \S+ \S+ \[/ {
    grok {
      match => {
        "message" => "%{IPORHOST:[source][ip]} %{DATA:[nginx][access][ident]} %{DATA:[nginx][access][user]} \[%{HTTPDATE:[nginx][access][time]}\] \"%{WORD:[http][request][method]} %{DATA:[url][path]} HTTP/%{NUMBER:[http][version]}\" %{INT:[http][response][status_code]} %{NUMBER:[http][response][body][bytes]} \"%{DATA:[http][request][referrer]}\" \"%{DATA:[user_agent][original]}\"( \"%{DATA:[http][request][x_forwarded_for]}\")?"
      }
      add_tag => ["nginx_access_log"]
    }

    mutate {
      convert => {
        "[http][response][status_code]" => "integer"
        "[http][response][body][bytes]" => "integer"
      }
    }
  }
}

output {
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    index => "app-logs-%{+YYYY.MM.dd}"
  }
}
