services:

  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: sqlserver
    restart: unless-stopped
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: "YourStrong@Passw0rd"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'YourStrong@Passw0rd' -Q 'SELECT 1' -C"
        ]
      interval: 15s
      timeout: 10s
      retries: 10
    networks:
      - app-network

  backend:
    image: m4nw1thp3nt35t/devops-backend:latest
    container_name: backend
    restart: unless-stopped
    environment:
      ConnectionStrings__DefaultConnection: "Server=db,1433;Database=BilliardsBookingDB;User Id=sa;Password=YourStrong@Passw0rd;TrustServerCertificate=True"
    depends_on:
      db:
        condition: service_healthy
    # Sửa healthcheck dùng cơ chế mở luồng TCP của Linux thay vì curl
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/8080 && echo -e 'GET / HTTP/1.1\r\nHost: localhost\r\n\r\n' >&3 && cat <&3 | grep -q 'HTTP/1.1' || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - app-network

  frontend:
    image: m4nw1thp3nt35t/devops-frontend:latest
    container_name: frontend
    restart: unless-stopped
    # Gỡ bỏ phần ports: "80:80" cũ ra, nhường cổng 80 ngoài máy ảo cho Nginx
    depends_on:
      - backend
    networks:
      - app-network

  # THÊM MỚI SERVICE NGINX Ở ĐÂY
  nginx:
    image: nginx:alpine
    container_name: nginx_proxy
    restart: unless-stopped
    ports:
      - "80:80"
      - "5000:5000"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro # Ánh xạ file cấu hình vừa tạo vào container
    depends_on:
      - frontend
      - backend
    networks:
      - app-network

  # ELK stack: Elasticsearch, Kibana, Logstash, Filebeat
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.1
    container_name: elasticsearch
    restart: unless-stopped
    mem_limit: 1g
    deploy:
      resources:
        limits:
          memory: 1G
    environment:
      - discovery.type=single-node
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
      - xpack.security.enabled=false
    ulimits:
      memlock:
        soft: -1
        hard: -1
    volumes:
      - esdata:/usr/share/elasticsearch/data
    ports:
      - "9200:9200"
    networks:
      - app-network

  kibana:
    image: docker.elastic.co/kibana/kibana:8.11.1
    container_name: kibana
    restart: unless-stopped
    mem_limit: 512m
    deploy:
      resources:
        limits:
          memory: 512M
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - SERVER_NAME=kibana
      - NODE_OPTIONS=--max-old-space-size=256
    ports:
      - "5601:5601"
    depends_on:
      - elasticsearch
    networks:
      - app-network

  logstash:
    image: docker.elastic.co/logstash/logstash:8.11.1
    container_name: logstash
    restart: unless-stopped
    mem_limit: 512m
    deploy:
      resources:
        limits:
          memory: 512M
    volumes:
      - ./logstash/pipeline:/usr/share/logstash/pipeline:ro
    ports:
      - "5044:5044" # beats
      # Note: host binding for container port 5000 removed to avoid
      # port conflict with nginx which binds host:5000. If you need
      # external access to Logstash TCP input, map to a different
      # host port like "5001:5000" instead of exposing 5000 directly.
    depends_on:
      - elasticsearch
    networks:
      - app-network

    environment:
      - LS_JAVA_OPTS=-Xms256m -Xmx256m

  filebeat:
    build:
      context: ./filebeat
    image: local/filebeat:8.11.1
    container_name: filebeat
    restart: unless-stopped
    user: root
    mem_limit: 256m
    deploy:
      resources:
        limits:
          memory: 256M
    volumes:
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/log:/var/log:ro
    depends_on:
      - logstash
    networks:
      - app-network

volumes:
  sqlserver_data:
  esdata:

networks:
  app-network:
    driver: bridge