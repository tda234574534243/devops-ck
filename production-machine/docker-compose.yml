services:

  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: sqlserver
    restart: unless-stopped
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: "YourStrong@Passw0rd"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'YourStrong@Passw0rd' -Q 'SELECT 1' -C"
        ]
      interval: 15s
      timeout: 10s
      retries: 10
    networks:
      - app-network

  backend:
    image: m4nw1thp3nt35t/devops-backend:latest
    container_name: backend
    restart: unless-stopped
    environment:
      ConnectionStrings__DefaultConnection: "Server=db,1433;Database=BilliardsBookingDB;User Id=sa;Password=YourStrong@Passw0rd;TrustServerCertificate=True"
      MailSettings__Host: "${MAIL_HOST}"
      MailSettings__Port: "${MAIL_PORT}"
      MailSettings__Username: "${MAIL_USERNAME}"
      MailSettings__Password: "${MAIL_PASSWORD}"
      MailSettings__SenderEmail: "${MAIL_SENDER_EMAIL}"
      MailSettings__DisplayName: "${MAIL_DISPLAY_NAME}"
      Logging__LogLevel__Default: "Information"
      Logging__LogLevel__Microsoft.AspNetCore: "Warning"
      Logging__LogLevel__Microsoft.EntityFrameworkCore.Database.Command: "Warning"
    depends_on:
      db:
        condition: service_healthy
    # Keep this compatible with the published backend image, which may not include curl or wget.
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/127.0.0.1/8080' || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - app-network

  frontend:
    image: m4nw1thp3nt35t/devops-frontend:latest
    container_name: frontend
    restart: unless-stopped
    # Gỡ bỏ phần ports: "80:80" cũ ra, nhường cổng 80 ngoài máy ảo cho Nginx
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1/ || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - app-network

  # THÊM MỚI SERVICE NGINX Ở ĐÂY
  nginx:
    image: nginx:alpine
    container_name: nginx_proxy
    restart: unless-stopped
    ports:
      - "80:80"
      - "5000:5000"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro # Ánh xạ file cấu hình vừa tạo vào container
    depends_on:
      frontend:
        condition: service_healthy
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1/ || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - app-network

  # ELK stack: Elasticsearch, Kibana, Logstash, Filebeat
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.1
    container_name: elasticsearch
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
      - xpack.security.enabled=false
    ulimits:
      memlock:
        soft: -1
        hard: -1
    volumes:
      - esdata:/usr/share/elasticsearch/data
    ports:
      - "9200:9200"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:9200/_cluster/health >/dev/null || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 60s
    networks:
      - app-network

  kibana:
    image: docker.elastic.co/kibana/kibana:8.11.1
    container_name: kibana
    restart: unless-stopped
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - SERVER_NAME=kibana
    ports:
      - "5601:5601"
    depends_on:
      elasticsearch:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:5601/api/status >/dev/null || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 90s
    networks:
      - app-network

  logstash:
    image: docker.elastic.co/logstash/logstash:8.11.1
    container_name: logstash
    restart: unless-stopped
    volumes:
      - ./logstash/pipeline:/usr/share/logstash/pipeline:ro
    ports:
      - "5044:5044" # beats
      # Note: host binding for container port 5000 removed to avoid
      # port conflict with nginx which binds host:5000. If you need
      # external access to Logstash TCP input, map to a different
      # host port like "5001:5000" instead of exposing 5000 directly.
    depends_on:
      elasticsearch:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:9600/_node/pipelines >/dev/null || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 60s
    networks:
      - app-network

  filebeat:
    build:
      context: ./filebeat
    image: local/filebeat:8.11.1
    container_name: filebeat
    restart: unless-stopped
    user: root
    volumes:
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/log:/var/log:ro
    depends_on:
      logstash:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "filebeat test config -c /usr/share/filebeat/filebeat.yml || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - app-network

volumes:
  sqlserver_data:
  esdata:

networks:
  app-network:
    driver: bridge
