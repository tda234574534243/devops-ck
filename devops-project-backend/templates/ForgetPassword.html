<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Đặt lại mật khẩu</title>
  </head>

  <body
    style="
      margin: 0;
      padding: 0;
      background-color: #f4f6f8;
      font-family: Arial, Helvetica, sans-serif;
    "
  >
    <table width="100%" cellpadding="0" cellspacing="0">
      <tr>
        <td align="center">
          <table
            width="600"
            cellpadding="0"
            cellspacing="0"
            style="
              background-color: #ffffff;
              margin-top: 30px;
              border-radius: 10px;
              overflow: hidden;
            "
          >
            <tr>
              <td
                style="
                  background-color: #dc3545;
                  padding: 20px;
                  text-align: center;
                  color: white;
                "
              >
                <h1 style="margin: 0">Đặt lại mật khẩu</h1>
              </td>
            </tr>

            <tr>
              <td style="padding: 30px">
                <h2 style="color: #333">Yêu cầu đặt lại mật khẩu</h2>

                <p style="color: #555; font-size: 16px">
                  Mã OTP để đặt lại mật khẩu của bạn:
                </p>

                <div style="text-align: center; margin: 30px 0">
                  <span
                    style="
                      font-size: 32px;
                      font-weight: bold;
                      color: #dc3545;
                      letter-spacing: 5px;
                      border: 2px dashed #dc3545;
                      padding: 15px 30px;
                      border-radius: 8px;
                    "
                  >
                    {{OTP}}
                  </span>
                </div>

                <p style="color: #777">Mã này sẽ hết hạn sau <b>3 phút</b>.</p>
              </td>
            </tr>

            <tr>
              <td
                style="
                  background-color: #f1f1f1;
                  padding: 20px;
                  text-align: center;
                  color: #888;
                  font-size: 12px;
                "
              >
                © 2026 Cuemasters Billiards
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
