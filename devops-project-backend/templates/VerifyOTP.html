<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Xác minh tài khoản</title>
  </head>

  <body
    style="
      margin: 0;
      padding: 0;
      background-color: #f4f6f8;
      font-family: Arial, Helvetica, sans-serif;
    "
  >
    <table width="100%" cellpadding="0" cellspacing="0">
      <tr>
        <td align="center">
          <table
            width="600"
            cellpadding="0"
            cellspacing="0"
            style="
              background-color: #ffffff;
              margin-top: 30px;
              border-radius: 10px;
              overflow: hidden;
            "
          >
            <!-- HEADER -->
            <tr>
              <td
                style="
                  background-color: #0d6efd;
                  padding: 20px;
                  text-align: center;
                  color: white;
                "
              >
                <h1 style="margin: 0">Cuemasters Billiards</h1>
              </td>
            </tr>

            <!-- CONTENT -->
            <tr>
              <td style="padding: 30px">
                <h2 style="color: #333">Xác minh tài khoản</h2>

                <p style="color: #555; font-size: 16px">Xin chào,</p>

                <p style="color: #555; font-size: 16px">Mã OTP của bạn là:</p>

                <div style="text-align: center; margin: 30px 0">
                  <span
                    style="
                      font-size: 32px;
                      font-weight: bold;
                      color: #0d6efd;
                      letter-spacing: 5px;
                      border: 2px dashed #0d6efd;
                      padding: 15px 30px;
                      border-radius: 8px;
                    "
                  >
                    {{OTP}}
                  </span>
                </div>

                <p style="color: #777">
                  Mã OTP có hiệu lực trong <b>3 phút</b>.
                </p>

                <p style="color: #777">
                  Nếu bạn không yêu cầu, hãy bỏ qua email này.
                </p>
              </td>
            </tr>

            <!-- FOOTER -->
            <tr>
              <td
                style="
                  background-color: #f1f1f1;
                  padding: 20px;
                  text-align: center;
                  color: #888;
                  font-size: 12px;
                "
              >
                © 2026 Cuemasters Billiards. All rights reserved.
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
